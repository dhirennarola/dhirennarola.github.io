name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Ensures the repo's Pages source is "GitHub Actions" (not the legacy
      # Jekyll branch build, which chokes on .astro files). configure-pages
      # only *creates* the Pages site; the PUT below also flips an existing
      # legacy-source configuration so the failing Jekyll runs stop.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Switch Pages source to GitHub Actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sf -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}' \
          || echo "::warning::Could not switch Pages build type via API — set Settings → Pages → Source = GitHub Actions manually"
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
